<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>轉換工作檯 — RNA m⁵C：從純化到 PCR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAEFEE; --card:#FFFFFF; --bench:#10171A; --ink:#10201B; --ink-soft:#46594F;
    --line:#CBD6D1; --line-d:#27332F;
    --A:#27A052; --C:#2F6FED; --G:#E0A12E; --U:#E0533D; --m5C:#9B4DDB;
    --ok:#27A052; --bad:#E0533D; --focus:#9B4DDB;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important;scroll-behavior:auto}}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,.disp{font-family:"Space Grotesk",sans-serif;letter-spacing:-.01em}
  .mono{font-family:"JetBrains Mono",monospace}
  a{color:var(--C)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  .grid{display:grid;grid-template-columns:248px 1fr;gap:34px;align-items:start}
  @media(max-width:860px){.grid{grid-template-columns:1fr}}

  header.hero{background:var(--bench);color:#E7EEEA;padding:46px 0 40px;border-bottom:1px solid var(--line-d)}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#7FE0B0}
  header.hero h1{font-size:clamp(30px,5vw,52px);line-height:1.02;margin:.34em 0 .35em;font-weight:600;color:#F3F8F5}
  header.hero p.lede{max-width:60ch;color:#AEC1B8;font-size:17px;margin:0}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:26px;font-family:"JetBrains Mono",monospace;font-size:12.5px}
  .legend span{display:inline-flex;align-items:center;gap:7px;color:#C7D6CF}
  .swatch{width:13px;height:13px;border-radius:3px;display:inline-block}

  nav.stepper{position:sticky;top:18px}
  .stepper ol{list-style:none;margin:0;padding:0}
  .step{display:flex;gap:13px;padding:11px 12px;border-radius:11px;cursor:pointer;align-items:flex-start;border:1px solid transparent;transition:background .15s,border-color .15s}
  .step:hover{background:#dfe7e4}
  .step[aria-current="true"]{background:var(--card);border-color:var(--line);box-shadow:0 1px 0 rgba(0,0,0,.03)}
  .step .num{font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;width:26px;height:26px;flex:0 0 26px;border-radius:7px;display:grid;place-items:center;background:#d3ddd8;color:var(--ink-soft)}
  .step[aria-current="true"] .num{background:var(--ink);color:#fff}
  .step.done .num{background:var(--ok);color:#fff}
  .step .lab{font-size:14px;font-weight:500;line-height:1.25}
  .step .sub{display:block;font-size:11.5px;color:var(--ink-soft);font-weight:400;margin-top:2px}
  .progress{margin-top:16px;font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink-soft)}
  .bar{height:6px;background:#d3ddd8;border-radius:99px;overflow:hidden;margin-top:7px}
  .bar > i{display:block;height:100%;width:0;background:var(--m5C);transition:width .4s ease}

  main{padding:34px 0 80px}
  .module{display:none;animation:fade .35s ease}
  .module.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .modhead{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}
  .modhead .tag{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--m5C);letter-spacing:.12em}
  .module h2{font-size:clamp(23px,3.4vw,33px);margin:.1em 0 .15em;font-weight:600}
  .module > p.intro{color:var(--ink-soft);font-size:16.5px;margin:.2em 0 0;max-width:66ch}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:22px 24px;margin-top:20px}
  .panel h3{font-size:13px;margin:0 0 12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:600;font-family:"JetBrains Mono",monospace}
  .panel p{margin:.4em 0}
  .analogy{border-left:3px solid var(--m5C);padding:4px 0 4px 15px;background:linear-gradient(90deg,rgba(155,77,219,.06),transparent);border-radius:0 8px 8px 0}
  .analogy b{color:var(--m5C)}
  .story{border-left:3px solid var(--G);background:linear-gradient(90deg,rgba(224,161,46,.08),transparent)}
  .story h3{color:#a9760f}
  .story p{margin:.3em 0;font-size:14.5px}
  .story a{color:#a9760f}
  .diagram svg{width:100%;height:auto;display:block}
  .diag-cap{font-size:12.5px;color:var(--ink-soft);margin-top:10px;font-family:"JetBrains Mono",monospace}

  .flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:6px}
  .stepcard{border:1px solid var(--line);border-radius:11px;padding:13px 14px;background:#fbfdfc}
  .stepcard .n{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--m5C);font-weight:700}
  .stepcard h4{font-size:15px;margin:3px 0 5px;font-weight:600}
  .stepcard p{font-size:13.5px;color:var(--ink-soft);margin:0}
  .ref{font-size:12.5px;color:var(--ink-soft);font-family:"JetBrains Mono",monospace;margin-top:14px}
  .ref a{color:var(--ink-soft);text-decoration:underline}

  /* ---- conversion bench (aligned 3-row alignment) ---- */
  .bench-panel{background:var(--bench);border:1px solid var(--line-d);border-radius:15px;padding:24px;margin-top:22px;color:#DEE9E3}
  .bench-panel h3{color:#7FE0B0;font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
  .bench-panel .hint{font-size:13.5px;color:#9DB3AA;margin:0 0 14px}
  .align{display:grid;gap:8px;overflow-x:auto;padding-bottom:6px}
  .arow{display:flex;align-items:center;gap:8px}
  .arow .rl{flex:0 0 92px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.05em;color:#7FE0B0;text-align:right}
  .arow .end{flex:0 0 18px;width:18px;text-align:center;font-family:"JetBrains Mono",monospace;font-size:12px;color:#6f857c}
  .cells{display:flex;gap:5px}
  .nt{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:17px;width:30px;height:38px;border-radius:7px;display:grid;place-items:center;background:#1d2826;position:relative;user-select:none;transition:transform .25s,background .25s,color .25s}
  .nt small{position:absolute;bottom:1px;font-size:7.5px;letter-spacing:0;opacity:.85;font-weight:500}
  .nt.A{color:var(--A)} .nt.C{color:var(--C)} .nt.G{color:var(--G)} .nt.U{color:var(--U)} .nt.T{color:var(--U)}
  .nt.m5C{color:#fff;background:var(--m5C);box-shadow:0 0 0 2px rgba(155,77,219,.4),0 6px 16px rgba(155,77,219,.35)}
  .nt.callC{color:#fff;background:var(--m5C)}
  .nt.callT{color:#fff;background:var(--U)}
  .nt.clickable{cursor:pointer;outline:1px dashed #3a4b45}
  .nt.clickable:hover{transform:translateY(-3px)}
  .nt.ghost{opacity:0}
  .nt.flip{animation:flip .5s ease}
  @keyframes flip{0%{transform:rotateX(0)}45%{transform:rotateX(90deg)}55%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}
  .benchctl{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;align-items:center}
  .btn{font-family:"Space Grotesk";font-weight:600;font-size:14px;border:0;border-radius:9px;padding:10px 16px;cursor:pointer;background:#28524a;color:#cdeee0;transition:background .15s,transform .1s}
  .btn:hover{background:#316156}.btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--m5C);color:#fff}.btn.primary:hover{background:#a960e0}
  .btn.ghost{background:transparent;border:1px solid #3a4b45;color:#9DB3AA}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .stagelab{font-family:"JetBrains Mono",monospace;font-size:12px;color:#7FE0B0;letter-spacing:.1em;margin-left:auto}
  .readout{margin-top:16px;padding:14px;border:1px dashed #3a4b45;border-radius:10px;font-size:13.5px;color:#B9CCC4;min-height:20px}
  .readout b.callC{color:#fff;background:var(--m5C);padding:1px 5px;border-radius:4px}
  .readout b.callT{color:#fff;background:var(--U);padding:1px 5px;border-radius:4px}

  /* ---- PCR simulator ---- */
  .pcr-panel{background:var(--bench);border:1px solid var(--line-d);border-radius:15px;padding:24px;margin-top:22px;color:#DEE9E3}
  .pcr-panel h3{color:#7FE0B0;font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin:0 0 4px}
  .pcr-top{display:grid;grid-template-columns:1.15fr .85fr;gap:22px;align-items:center}
  @media(max-width:680px){.pcr-top{grid-template-columns:1fr}}
  .pcrsvg{width:100%;height:auto;background:#0c1214;border:1px solid var(--line-d);border-radius:10px}
  .pcr-stats .big{font-family:"Space Grotesk";font-weight:700;font-size:clamp(28px,6vw,40px);line-height:1;color:#F3F8F5}
  .pcr-stats .lbl{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;color:#7FE0B0;text-transform:uppercase}
  .pcr-stats .copies{font-family:"JetBrains Mono",monospace;font-size:15px;color:#cdeee0;margin-top:10px}
  .pcr-stats .copies b{color:#fff}
  .pcr-bar{height:8px;background:#1d2826;border-radius:99px;overflow:hidden;margin-top:12px}
  .pcr-bar>i{display:block;height:100%;width:0;background:var(--m5C);transition:width .35s ease}
  .phase{font-family:"JetBrains Mono",monospace;font-size:12px;margin-top:14px;letter-spacing:.04em;min-height:18px;line-height:1.3}
  .phase .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .pcrctl{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;align-items:center}
  .pcr-note{font-size:12.5px;color:#9DB3AA;margin-top:14px;font-family:"JetBrains Mono",monospace}
  /* duplex animation states */
  #topStrand,#botStrand{transition:transform .35s ease}
  #primers,#newTop,#newBot{transition:opacity .4s ease}
  .stage-denature #topStrand,.stage-anneal #topStrand,.stage-extend #topStrand{transform:translateY(-15px)}
  .stage-denature #botStrand,.stage-anneal #botStrand,.stage-extend #botStrand{transform:translateY(15px)}
  .stage-anneal #primers,.stage-extend #primers{opacity:1}
  .stage-extend #newTop,.stage-extend #newBot{opacity:.95}
  /* population view */
  .pcrpop .lane{display:flex;align-items:center;gap:10px;margin:12px 0}
  .pcrpop .lane-l{flex:0 0 124px;font-family:"JetBrains Mono",monospace;font-size:10.5px;color:#9DB3AA;line-height:1.35}
  .pcrpop .lane-l em{color:#6f857c;font-style:normal}
  .pcrpop .lane-cells{flex:1;display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start;min-height:20px}
  .pcrpop .lane-n{flex:0 0 auto;font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:700;color:#F3F8F5;min-width:84px;text-align:right}
  .lc{display:inline-block;height:8px;border-radius:3px}
  .lc.long{width:26px;background:var(--C)}
  .lc.short{width:9px;background:var(--m5C)}
  .pop-note{font-family:"JetBrains Mono",monospace;font-size:11px;color:#9DB3AA;margin-top:12px;line-height:1.45}

  .quiz{margin-top:22px;border:1px solid var(--line);border-radius:15px;padding:22px 24px;background:#fbfdfc}
  .quiz h3{font-size:17px;margin:0 0 4px;font-weight:600;color:var(--ink)}
  .quiz .q{margin-top:16px}
  .quiz .q p.qtext{font-weight:600;margin:0 0 9px}
  .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 14px;margin:7px 0;cursor:pointer;font:inherit;font-size:14.5px;transition:border-color .12s,background .12s}
  .opt:hover{border-color:var(--m5C)}
  .opt:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  .opt.correct{border-color:var(--ok);background:rgba(39,160,82,.08)}
  .opt.wrong{border-color:var(--bad);background:rgba(224,83,61,.08)}
  .opt.locked{cursor:default;pointer-events:none}
  .explain{font-size:13.5px;color:var(--ink-soft);margin:8px 2px 0;display:none}
  .explain.show{display:block}
  .quizdone{margin-top:16px;font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ok);display:none}
  .quizdone.show{display:block}

  .navrow{display:flex;justify-content:space-between;margin-top:30px;gap:12px}
  .navrow button{font-weight:600;font-size:14px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 18px;cursor:pointer;color:var(--ink);font-family:"Space Grotesk"}
  .navrow button:hover{border-color:var(--m5C);color:var(--m5C)}
  .navrow button:disabled{opacity:.4;cursor:not-allowed}
  .navrow button.next{background:var(--ink);color:#fff;border-color:var(--ink)}
  .navrow button.next:hover{background:var(--m5C);border-color:var(--m5C);color:#fff}
  footer{border-top:1px solid var(--line);padding:26px 0;color:var(--ink-soft);font-size:13px}
  .kbd{font-family:"JetBrains Mono",monospace;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px}
  :focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  .scrollhint{color:var(--m5C);font-weight:600;text-transform:none;letter-spacing:0}
  /* ============ MOBILE / SMARTPHONE ============ */
  @media(max-width:860px){
    body{-webkit-text-size-adjust:100%}
    .grid{gap:0}
    nav.stepper{position:sticky;top:0;z-index:30;background:var(--paper);padding:10px 0 8px;box-shadow:0 6px 10px -8px rgba(0,0,0,.25)}
    .stepper ol{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
    .stepper ol::-webkit-scrollbar{display:none}
    .step{flex:0 0 auto;gap:8px;align-items:center;padding:9px 14px;border:1px solid var(--line);background:var(--card);border-radius:999px}
    .step:hover{background:var(--card)}
    .step .lab{white-space:nowrap;font-size:13.5px;line-height:1}
    .step .sub{display:none}
    .step .num{width:23px;height:23px;flex-basis:23px}
    .step[aria-current="true"]{border-color:var(--m5C);background:#fff}
    .progress{margin-top:10px}
    main{padding-top:18px}
    /* all diagrams fit the screen by default */
    .diagram svg{width:100%;height:auto}
  }
  @media(max-width:560px){
    .wrap{padding:0 16px}
    header.hero{padding:30px 0 26px}
    header.hero p.lede{font-size:16px;line-height:1.5}
    .module h2{font-size:25px}
    .module > p.intro{font-size:16.5px;line-height:1.55}
    .panel{padding:18px 16px;border-radius:12px;margin-top:16px}
    .panel p{font-size:16px}
    .panel h3{font-size:12px}
    .analogy{font-size:16px}
    .diag-cap{font-size:13px}
    /* pictorial diagrams: fit; dense ones: pan */
    .panel.diagram.wide{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .panel.diagram.wide svg{width:100%;min-width:640px;height:auto}
    /* conversion bench */
    .bench-panel,.pcr-panel{padding:18px 15px}
    .bench-panel .hint,.pcr-panel .hint{font-size:14.5px}
    .arow{gap:6px}
    .arow .rl{flex-basis:58px;width:58px;font-size:9.5px}
    .arow .end{flex-basis:14px;width:14px}
    .cells{gap:4px}
    .nt{width:28px;height:35px;font-size:16px}
    .readout{font-size:14.5px}
    /* stepcards + flow: single column so the workflow reads top-to-bottom */
    .flow{grid-template-columns:1fr}
    .stepcard{padding:15px 16px}
    .stepcard h4{font-size:16px}
    .stepcard p{font-size:14.5px}
    /* touch targets */
    .opt{padding:14px 15px;min-height:48px;font-size:15.5px}
    .btn{min-height:48px;font-size:15px}
    .quiz{padding:20px 16px}
    .quiz h3{font-size:17px}
    .quiz .q p.qtext{font-size:16px}
    .explain{font-size:14.5px}
    .navrow{gap:8px}
    .navrow button{flex:1;min-height:48px;font-size:13.5px;padding:12px 8px;text-align:center}
    /* pcr */
    .pcr-stats .big{font-size:32px}
    .pcr-stats .copies{font-size:14px}
    .pcrpop .lane-l{flex-basis:104px;font-size:11px}
  }
  @media(max-width:390px){
    .wrap{padding:0 13px}
    .legend{font-size:11px;gap:9px}
    .nt{width:26px;height:33px;font-size:15px}
    .arow .rl{flex-basis:52px;width:52px}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <div class="eyebrow">RNA 表觀轉錄體學 · m⁵C 偵測 · 互動實驗模組</div>
    <h1>轉換工作檯</h1>
    <p class="lede">從冷凍的細胞團塊，到定序圖譜上標示「已甲基化」的訊號峰。一步一步走過真實的 RNA 亞硫酸氫鹽定序 (bisulfite sequencing) 流程，並認識整個領域賴以成立的關鍵化學把戲：未甲基化的胞嘧啶會去胺基，甲基化的則不會。</p>
    <div class="legend" aria-label="鹼基顏色對照">
      <span><i class="swatch" style="background:var(--A)"></i>A&nbsp;腺嘌呤</span>
      <span><i class="swatch" style="background:var(--C)"></i>C&nbsp;胞嘧啶</span>
      <span><i class="swatch" style="background:var(--G)"></i>G&nbsp;鳥嘌呤</span>
      <span><i class="swatch" style="background:var(--U)"></i>U&nbsp;尿嘧啶</span>
      <span><i class="swatch" style="background:var(--m5C)"></i>m⁵C&nbsp;甲基胞嘧啶</span>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="grid">
    <nav class="stepper" aria-label="流程步驟">
      <ol id="stepper"></ol>
      <div class="progress">
        <span id="progresslabel">0 / 6 個模組已完成</span>
        <div class="bar"><i id="progressbar"></i></div>
      </div>
    </nav>
    <main id="main"></main>
  </div>
</div>

<footer>
  <div class="wrap">
    此為入門教學模組。使用 <span class="kbd">←</span> <span class="kbd">→</span> 在步驟間切換。完成模組測驗即可將其標記點亮為綠色。
  </div>
</footer>

<script>
/* =========================================================
   DIAGRAM HELPERS
   ========================================================= */

/* --- pyrimidine ring builder for the bisulfite mechanism --- */
function pyr(cx,cy,o){
  const R=28, dx=24, dy=14;
  const v={
    C4:[cx,cy-R], N3:[cx+dx,cy-dy], C2:[cx+dx,cy+dy],
    N1:[cx,cy+R], C6:[cx-dx,cy+dy], C5:[cx-dx,cy-dy]
  };
  const L=(a,b,col="var(--ink)",w=1.8)=>`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${col}" stroke-width="${w}"/>`;
  const DBL=(a,b,col="var(--ink)")=>{const ddx=b[0]-a[0],ddy=b[1]-a[1],m=Math.hypot(ddx,ddy),ox=-ddy/m*2.4,oy=ddx/m*2.4;
    return L([a[0]+ox,a[1]+oy],[b[0]+ox,b[1]+oy],col)+L([a[0]-ox,a[1]-oy],[b[0]-ox,b[1]-oy],col);};
  let s="";
  // ring skeleton
  s+=L(v.N1,v.C2)+L(v.C2,v.N3)+L(v.N3,v.C4)+L(v.C4,v.C5)+L(v.C5,v.C6)+L(v.C6,v.N1);
  // 5,6 double bond (inner parallel) when present
  if(!o.sat56) s+=L([v.C5[0]+4,v.C5[1]+2],[v.C6[0]+4,v.C6[1]-2],"var(--ink)",1.6);
  // ring N atoms
  const atom=(p,t)=>`<circle cx="${p[0]}" cy="${p[1]}" r="8.5" fill="var(--card)"/><text x="${p[0]}" y="${p[1]+4}" text-anchor="middle" font-family="JetBrains Mono" font-size="12" font-weight="700" fill="var(--ink)">${t}</text>`;
  s+=atom(v.N1,"N")+atom(v.N3,"N");
  // tiny 5 / 6 position numerals
  s+=`<text x="${cx-13}" y="${cy-8}" font-family="JetBrains Mono" font-size="7.5" fill="#9aa9a1">5</text>`;

}

  // row labels
  s+=`<text x="36" y="${yRef+5}" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="var(--ink-soft)">REF</text>`;
  s+=`<text x="36" y="${yConv+5}" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="var(--ink-soft)">cDNA</text>`;
  ref.forEach((b,i)=>{
    s+=`<text x="${x0+i*cw}" y="${yRef+5}" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="16" fill="${colOf(b)}">${b}</text>`;
    let cb=b,cc=colOf(b);
    if(b==="C"){ if(i===cand){cb="C";cc="var(--m5C)";} else {cb="T";cc="var(--U)";} }
    if(b==="U"){cb="A";cc="var(--A)";}            // converted cDNA strand: template U -> A in cDNA... keep teaching-simple: show converted READ
    // simpler & consistent with bench: show converted strand bases (C->T unless m5C)
    if(b==="U"){cb="U";cc="var(--U)";}
    s+=`<text x="${x0+i*cw}" y="${yConv+5}" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="16" fill="${cc}">${cb}</text>`;
  });
  // candidate label
  s+=`<text x="${x0+cand*cw}" y="38" text-anchor="middle" font-family="JetBrains Mono" font-size="9.5" fill="var(--m5C)">候選 m⁵C — 保持淨空</text>`;
  // forward primer arrow (5'->3', points right) under left flank
  const fx1=x0+fwd[0]*cw-10, fx2=x0+fwd[1]*cw+10;
  s+=`<line x1="${fx1}" y1="138" x2="${fx2}" y2="138" stroke="var(--A)" stroke-width="3" marker-end="url(#pf)"/>`;
  s+=`<text x="${(fx1+fx2)/2}" y="156" text-anchor="middle" font-family="JetBrains Mono" font-size="10.5" fill="var(--A)">正向引子 5′→3′</text>`;
  // reverse primer arrow (5'->3' on complement, points left) under right flank
  const rx1=x0+rev[1]*cw+10, rx2=x0+rev[0]*cw-10;
  s+=`<line x1="${rx1}" y1="138" x2="${rx2}" y2="138" stroke="var(--U)" stroke-width="3" marker-end="url(#pr)"/>`;
  s+=`<text x="${(rx1+rx2)/2}" y="156" text-anchor="middle" font-family="JetBrains Mono" font-size="10.5" fill="var(--U)">反向引子 5′→3′</text>`;
  s+=`<text x="340" y="178" text-anchor="middle" font-family="IBM Plex Sans" font-size="11" fill="var(--ink-soft)">擴增子涵蓋候選位點；兩支引子皆不觸及它</text>`;
  s+=`<defs>
    <marker id="pf" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--A)"/></marker>

  </defs></svg>`;
  return s;
}

const state={active:0,cleared:new Array(MODULES.length).fill(false)};
const stepperEl=document.getElementById('stepper');
const mainEl=document.getElementById('main');

function renderStepper(){
  stepperEl.innerHTML=MODULES.map((m,i)=>`
    <li class="step ${state.cleared[i]?'done':''}" data-i="${i}" role="button" tabindex="0" aria-current="${i===state.active}">
      <span class="num">${state.cleared[i]?'✓':String(i+1).padStart(2,'0')}</span>
      <span class="lab">${m.title}<span class="sub">${m.short}</span></span>
    </li>`).join('');
  stepperEl.querySelectorAll('.step').forEach(s=>{
    const go=()=>setActive(+s.dataset.i);
    s.addEventListener('click',go);
    s.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();go();}});
  });
  const n=state.cleared.filter(Boolean).length;
  document.getElementById('progresslabel').textContent=`${n} / ${MODULES.length} 個模組已完成`;
  document.getElementById('progressbar').style.width=(n/MODULES.length*100)+'%';
}

  if(p.a) return `<div class="panel"><div class="analogy">${p.html}</div></div>`;

    p.flow.map((s,i)=>`<div class="stepcard"><div class="n">${String(i+1).padStart(2,'0')}</div><h4>${s.h}</h4><p>${s.p}</p></div>`).join('')}</div></div>`;
  if(p.story) return `<div class="panel story"><h3>${p.h}</h3><p>${p.html}</p></div>`;
  if(p.ref) return `<p class="ref">${p.html}</p>`;
  return `<div class="panel"><h3>${p.h}</h3><p>${p.html}</p></div>`;
}
function diagramHTML(m){

function renderModule(){
  const m=MODULES[state.active];
  mainEl.innerHTML=MODULES.map((mod,i)=>{
    const body=`
      <div class="modhead"><span class="tag">${mod.tag}</span></div>
      <h2>${mod.title}</h2>
      <p class="intro">${mod.intro}</p>
      ${diagramHTML(mod)}
      ${mod.bench?benchHTML():''}
      ${mod.pcr?pcrHTML():''}
      ${mod.panels.map(panelHTML).join('')}
      ${quizHTML(mod.quiz,i)}
      <div class="navrow">
        <button class="prev" ${i===0?'disabled':''}>← ${i===0?'開始':MODULES[i-1].title}</button>
        <button class="next" ${i===MODULES.length-1?'disabled':''}>${i===MODULES.length-1?'流程結束':MODULES[i+1].title+' →'}</button>
      </div>`;
    return `<section class="module ${i===state.active?'active':''}" data-i="${i}">${body}</section>`;
  }).join('');

  mainEl.querySelectorAll('.q').forEach(qEl=>{
    const mi=+qEl.dataset.mi,qi=+qEl.dataset.qi;
    const item=MODULES[mi].quiz.questions[qi];
    const explain=qEl.querySelector('.explain');
    qEl.querySelectorAll('.opt').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(qEl.dataset.answered)return;
        qEl.dataset.answered='1';
        const oi=+btn.dataset.oi;
        qEl.querySelectorAll('.opt').forEach(b=>b.classList.add('locked'));
        if(oi===item.correct){btn.classList.add('correct');}
        else{btn.classList.add('wrong');qEl.querySelectorAll('.opt')[item.correct].classList.add('correct');}
        explain.textContent=item.exp;explain.classList.add('show');
        checkQuizComplete(mi);
      });
    });
  });

  const sec=mainEl.querySelector('.module.active');
  sec.querySelector('.prev')?.addEventListener('click',()=>setActive(state.active-1));
  sec.querySelector('.next')?.addEventListener('click',()=>setActive(state.active+1));

  if(m.bench) initBench();
  if(m.pcr) initPCR();
  window.scrollTo({top:0,behavior:'smooth'});
}
function checkQuizComplete(mi){
  const sec=mainEl.querySelector(`.module[data-i="${mi}"]`);
  const qs=sec.querySelectorAll('.q');
  if([...qs].filter(q=>q.dataset.answered).length===qs.length){
    sec.querySelector('.quizdone').classList.add('show');
    if(!state.cleared[mi]){state.cleared[mi]=true;renderStepper();}
  }
}
function setActive(i){if(i<0||i>=MODULES.length)return;state.active=i;renderStepper();renderModule();}

/* =========================================================
   CONVERSION BENCH (aligned reference / converted / read)
   ========================================================= */
const SEQ="AUCGCAUCCGAACGUCGCAUC".split("");
let bench;
function initBench(){
  bench={bases:SEQ.map(b=>({base:b,methyl:false})),stage:"edit"};
  drawBench();
  const cBtn=document.getElementById('convertBtn'),rBtn=document.getElementById('readBtn');
  cBtn.disabled=false;rBtn.disabled=true;
  document.getElementById('stagelab').textContent="階段 · 編輯";
  document.getElementById('readout').innerHTML="先讓幾個胞嘧啶甲基化，再加入亞硫酸氫鹽，觀察未甲基化的 C 去胺基變成 U。";
  cBtn.onclick=convert;rBtn.onclick=readResult;document.getElementById('resetBtn').onclick=initBench;
}
function cell(base,opts={}){
  const cls=opts.cls||base;
  return `<div class="nt ${cls} ${opts.clickable?'clickable':''} ${opts.ghost?'ghost':''} ${opts.flip?'flip':''}" ${opts.i!==undefined?`data-i="${opts.i}"`:''}>${base}${opts.label?`<small>${opts.label}</small>`:''}</div>`;
}
function drawBench(){
  const showConv=bench.stage==="converted"||bench.stage==="read";
  const showRead=bench.stage==="read";
  const refCells=bench.bases.map((b,i)=>{
    if(b.base==="C"&&b.methyl) return cell("C",{cls:"m5C",label:"m⁵C",i,clickable:bench.stage==="edit"});
    return cell(b.base,{i,clickable:bench.stage==="edit"&&b.base==="C"});
  }).join('');
  const convCells=bench.bases.map(b=>{
    if(!showConv) return cell(b.base,{ghost:true});
    if(b.base==="C"&&b.methyl) return cell("C",{cls:"m5C",label:"m⁵C"});
    if(b.base==="C"&&!b.methyl) return cell("U",{cls:"U",flip:true});
    return cell(b.base);
  }).join('');
  const readCells=bench.bases.map(b=>{
    if(!showRead) return cell(b.base,{ghost:true});
    if(b.base==="C"&&b.methyl) return cell("C",{cls:"callC"});
    if(b.base==="C"&&!b.methyl) return cell("T",{cls:"callT"});
    if(b.base==="U") return cell("T",{cls:"T"});
    return cell(b.base);
  }).join('');

  document.getElementById('align').innerHTML=`
    <div class="arow"><span class="rl">參考</span><span class="end">5′</span><div class="cells">${refCells}</div><span class="end">3′</span></div>
    <div class="arow"><span class="rl">轉換</span><span class="end">5′</span><div class="cells">${convCells}</div><span class="end">3′</span></div>
    <div class="arow"><span class="rl">cDNA 判讀</span><span class="end"></span><div class="cells">${readCells}</div><span class="end"></span></div>`;

  if(bench.stage==="edit"){
    document.querySelectorAll('#align .nt.clickable').forEach(n=>{
      n.addEventListener('click',()=>{const i=+n.dataset.i;bench.bases[i].methyl=!bench.bases[i].methyl;drawBench();});
    });
  }
}
function convert(){
  bench.stage="converted";drawBench();
  document.getElementById('convertBtn').disabled=true;
  document.getElementById('readBtn').disabled=false;
  document.getElementById('stagelab').textContent="階段 · 已轉換";
  const surv=bench.bases.filter(b=>b.base==="C"&&b.methyl).length;
  document.getElementById('readout').innerHTML=`已加入亞硫酸氫鹽。未甲基化的胞嘧啶走完整條路徑變成 <b style="color:var(--U)">U</b>（轉換列）。有 <b>${surv}</b> 個胞嘧啶存留——它們戴著甲基頭盔（m⁵C）。現在進行反轉錄並判讀。`;
}
function readResult(){
  bench.stage="read";drawBench();
  document.getElementById('readBtn').disabled=true;
  document.getElementById('stagelab').textContent="階段 · 判讀";
  const methPos=bench.bases.map((b,i)=>(b.base==="C"&&b.methyl)?i+1:null).filter(x=>x);
  document.getElementById('readout').innerHTML= methPos.length
    ? `在 cDNA 判讀列中，每個 <b class="callC">C</b> 都是一次甲基化判定（m⁵C），位於第 ${methPos.join('、')} 位。每個 <b class="callT">T</b> 原本都是未甲基化的胞嘧啶。這一個字母的差異，就是你全部的結果。`
    : `沒有任何胞嘧啶存留——你沒有讓任何一個甲基化。判讀列在胞嘧啶位點全為 T：這正是完全未甲基化對照組應有的樣子。`;
}

/* =========================================================
   PCR SIMULATOR
   ========================================================= */
let pcr;
const PHASES=[
  {cls:"stage-denature",name:"變性 95 °C — 雙股分離",color:"var(--U)"},
  {cls:"stage-anneal",  name:"黏合 55 °C — 引子結合",       color:"var(--C)"},
  {cls:"stage-extend",  name:"延伸 72 °C — 聚合酶複製",  color:"var(--A)"}
];
function fmt(n){return n.toLocaleString('en-US');}
function reduceMotion(){return window.matchMedia('(prefers-reduced-motion:reduce)').matches;}
function initPCR(){
  pcr={cycle:0,busy:false};
  showDuplex();
  updatePCRStats();
  setPhase(-1);
  document.getElementById('cycleBtn').onclick=()=>runCycle();
  document.getElementById('pcrReset').onclick=initPCR;
  document.getElementById('runBtn').onclick=fastForward;
}
function showDuplex(){document.getElementById('pcrStage').hidden=false;document.getElementById('pcrPop').hidden=true;}
function showPop(){document.getElementById('pcrStage').hidden=true;document.getElementById('pcrPop').hidden=false;}
function setPhase(idx){
  const stage=document.getElementById('pcrStage');
  const label=document.getElementById('phaseLabel');
  stage.classList.remove('stage-denature','stage-anneal','stage-extend');
  if(idx<0){label.innerHTML=`<span class="dot" style="background:#3a4b45"></span>閒置 — 準備開始循環`;return;}
  const p=PHASES[idx];
  stage.classList.add(p.cls);
  label.innerHTML=`<span class="dot" style="background:${p.color}"></span>${p.name}`;
}
function updatePCRStats(){
  document.getElementById('cycleNum').textContent=pcr.cycle;
  document.getElementById('expN').textContent=pcr.cycle;
  document.getElementById('copyCount').textContent=fmt(Math.pow(2,pcr.cycle));
  document.getElementById('pcrBar').style.width=(pcr.cycle/30*100)+'%';
}
function runCycle(done){
  if(pcr.busy||pcr.cycle>=30){done&&done();return;}
  showDuplex();
  pcr.busy=true;
  const btns=[document.getElementById('cycleBtn'),document.getElementById('runBtn')];
  btns.forEach(b=>b.disabled=true);
  if(reduceMotion()){
    pcr.cycle++;updatePCRStats();setPhase(-1);pcr.busy=false;btns.forEach(b=>b.disabled=false);done&&done();return;
  }
  setPhase(0);
  setTimeout(()=>setPhase(1),440);
  setTimeout(()=>setPhase(2),880);
  setTimeout(()=>{
    pcr.cycle++;updatePCRStats();setPhase(-1);
    pcr.busy=false;btns.forEach(b=>b.disabled=false);done&&done();
  },1440);
}
/* accurate-ish population model:
   long  = original template + single-primer run-off products  -> grows linearly (~1 + 2n)
   short = defined amplicon bounded by both primers            -> total(2^n) minus long */
function drawPopulation(){
  const n=pcr.cycle;
  const total=Math.pow(2,n);
  const long=1+2*n;
  const short=Math.max(0,total-long);
  document.getElementById('longN').textContent=fmt(long);
  document.getElementById('shortN').textContent=fmt(short);
  document.getElementById('laneLong').innerHTML=Array.from({length:Math.min(long,10)},()=>'<i class="lc long"></i>').join('');
  document.getElementById('laneShort').innerHTML=Array.from({length:Math.min(short,80)},()=>'<i class="lc short"></i>').join('');
  const note=document.getElementById('popNote');
  if(short<=0) note.textContent='第 1–2 循環：只有模板 + 單引子滑脫產物（長、長度不一）。尚無完全定義的擴增子。';
  else note.textContent='從第 3 循環起，定義明確的擴增子（由兩支引子界定）出現並每循環加倍——很快就壓過線性增長的模板 + 滑脫產物族群。';
}
function fastForward(){
  if(pcr.busy)return;
  pcr.busy=true;
  showPop();
  document.getElementById('phaseLabel').innerHTML='<span class="dot" style="background:var(--m5C)"></span>族群視圖 — 指數擴增子 對 線性模板';
  const btns=[document.getElementById('cycleBtn'),document.getElementById('runBtn')];
  btns.forEach(b=>b.disabled=true);
  const rm=reduceMotion();
  const finish=()=>{pcr.busy=false;btns.forEach(b=>b.disabled=false);};
  if(rm){pcr.cycle=30;updatePCRStats();drawPopulation();finish();return;}
  const tick=()=>{
    if(pcr.cycle>=30){finish();return;}
    pcr.cycle++;updatePCRStats();drawPopulation();
    setTimeout(tick,70);
  };
  tick();
}

/* =========================================================
   INIT + KEYBOARD
   ========================================================= */
renderStepper();renderModule();
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','BUTTON'].includes(document.activeElement.tagName))return;
  if(e.key==='ArrowRight')setActive(state.active+1);
  if(e.key==='ArrowLeft')setActive(state.active-1);
});
</script>
